name: CI Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
        env:
          JWT_SECRET: test-secret-ci
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_KEY: fake-key
